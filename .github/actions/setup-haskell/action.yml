name: 'Setup Haskell build environment'
description: 'Installs protoc and restores the Stack cache for utxorpc-client/server.'

runs:
  using: composite
  steps:
    - name: Install protoc
      shell: bash
      run: |
        PROTOC_ZIP=protoc-3.14.0-linux-x86_64.zip
        curl -OL https://github.com/protocolbuffers/protobuf/releases/download/v3.14.0/$PROTOC_ZIP
        unzip -o $PROTOC_ZIP -d . bin/protoc
        unzip -o $PROTOC_ZIP -d . 'include/*'
        rm -f $PROTOC_ZIP
        echo "$(pwd)/bin" >> "$GITHUB_PATH"

    - name: Cache Stack
      uses: actions/cache@v4
      with:
        path: |
          /home/runner/.stack
          .stack-work
          server/.stack-work
          client/.stack-work
        key: stack-${{ hashFiles('stack.yaml.lock') }}
        restore-keys: stack-
