name: Release

# Conforms to the umbrella SDK release pipeline contract:
# u5c-factory reference/sdk-pipeline.md
#
# Haskell carve-out: the haskell-sdk packages use independent `0.0.x`
# numbering; the `v*` tag must match the version the `.cabal` files declare.
on:
  push:
    tags: ['v*']

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches cabal versions
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          for f in client/utxorpc-client.cabal server/utxorpc-server.cabal; do
            MANIFEST=$(sed -nE 's/^version:[[:space:]]*(.+)/\1/p' "$f")
            if [ "$TAG" != "$MANIFEST" ]; then
              echo "::error::tag $GITHUB_REF_NAME does not match $f version $MANIFEST"
              exit 1
            fi
          done

  build:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-haskell
      - run: stack build

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-haskell
      - run: stack test

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-haskell

      - name: Build Haddocks
        run: stack haddock --haddock-for-hackage

      - name: Publish to Hackage
        env:
          HACKAGE_KEY: ${{ secrets.HACKAGE_REGISTRY_TOKEN }}
        run: |
          stack upload client server
          stack upload client server --documentation

      - name: Make sdist artifacts
        id: make-artifacts
        run: |
          SERVER_DIST=$(stack sdist server 2>&1 |
            sed -nE 's|^(.*utxorpc-server-.*\.tar\.gz).*$|\1|p')
          echo "SERVER_DIST=$SERVER_DIST" >> "$GITHUB_OUTPUT"
          CLIENT_DIST=$(stack sdist client 2>&1 |
            sed -nE 's|^(.*utxorpc-client-.*\.tar\.gz).*$|\1|p')
          echo "CLIENT_DIST=$CLIENT_DIST" >> "$GITHUB_OUTPUT"

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ steps.make-artifacts.outputs.SERVER_DIST }}
            ${{ steps.make-artifacts.outputs.CLIENT_DIST }}
